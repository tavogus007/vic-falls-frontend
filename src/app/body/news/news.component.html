<section class="news-section py-5" id="news">
  <div class="container text-center">
    <h2 class="section-title mb-3">News</h2>
    <div class="row align-items-center">
      <div class="col-lg-6 mb-4 mb-lg-0">
        <div id="newsCarousel" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner rounded shadow">
            <div
              class="carousel-item"
              [class.active]="i === 0"
              *ngFor="let item of news; let i = index"
            >
              <img
                [src]="item.image"
                class="d-block w-100 news-image"
                alt="News image"
              />
            </div>
          </div>

          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#newsCarousel"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#newsCarousel"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
      </div>

      <div class="col-lg-6 text-values d-flex flex-column gap-4">
        <div class="news-content p-4">
          <h3 class="news-title">
            {{ news[activeIndex].title }}
          </h3>

          <p class="news-date">
            {{ news[activeIndex].date }}
          </p>

          <p class="news-description">
            {{ news[activeIndex].description }}
          </p>
        </div>

        <div class="news-content p-4">
          <button class="btn btn-outline-dark" (click)="openNewsletter()">
            Newsletter
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Newsletter Modal -->
<div
  class="modal fade"
  id="newsletterModal"
  tabindex="-1"
  aria-labelledby="newsletterModalLabel"
  aria-hidden="true"
>
  <div
    class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"
  >
    <div class="modal-content newsletter-modal-content">
      <div class="modal-header border-0 pb-0">
        <div class="w-100 text-center pt-2">
          <span class="newsletter-label">Stay Informed</span>
          <h2 class="section-title mt-2" id="newsletterModalLabel">
            Upcoming Activities & Events
          </h2>
          <p class="section-subtitle">
            A curated overview of our most relevant upcoming engagements.
          </p>
        </div>
        <button
          type="button"
          class="btn-close position-absolute top-0 end-0 m-3"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <div class="modal-body pt-2 pb-4">
        <app-newsletter></app-newsletter>
      </div>
    </div>
  </div>
</div>
